<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sagar Bhilare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#0b1220;color:#e2e8f0;}

/* SIDEBAR */
.sidebar{
  width:260px;height:100vh;background:#0f172a;
  padding:30px 20px;position:fixed;
}
.profile-img{
  width:90px;height:90px;border-radius:50%;
  background:url('https://raw.githubusercontent.com/sagarbhilare90/Ai_Portfolio/main/profile.jpg') center/cover;
  margin:auto;
}
.name{
  text-align:center;
  margin-top:10px;
  font-weight:600;
}

/* NAV */
.nav{margin-top:30px;}
.nav a{
  display:block;padding:10px;color:#94a3b8;text-decoration:none;border-radius:8px;
}
.nav a:hover{
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:white;
}

/* MAIN */
.main{margin-left:260px;width:100%;}

/* HERO */
.hero{
  height:100vh;
  background:url('https://raw.githubusercontent.com/sagarbhilare90/Ai_Portfolio/main/Gemini_Generated_Image_o3s6fyo3s6fyo3s6.png') center/cover no-repeat;
  display:flex;align-items:center;padding:60px;position:relative;
}
.hero::after{
  content:"";position:absolute;inset:0;background:rgba(0,0,0,0.7);
}
.hero-content{position:relative;}

.hero h1{
  font-size:60px;
  background:linear-gradient(90deg,#ffffff,#67e8f9);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  font-size:22px;margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="profile-img"></div>
  <div class="name">Sagar Bhilare</div>

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="about.html">Summary</a>
    <a href="experience.html">Experience</a>
    <a href="projects.html">Projects</a>
    <a href="skills.html">Skills</a>
    <a href="education.html">Education</a>
    <a href="achievements.html">Achievements</a>
    <a href="contact.html">Contact</a>
  </div>
</div>

<div class="main">
<section class="hero">
  <div class="hero-content">
    <h1>Sagar Bhilare</h1>
    <p id="typing"></p>
  </div>
</section>
</div>

<script>
const roles=["Lead AI Engineer","GenAI Architect","Data Science Team Lead"];
let i=0,j=0,current="",isDeleting=false;
function type(){
current=roles[i];
document.getElementById("typing").innerHTML=current.substring(0,j);
if(!isDeleting&&j<current.length){j++;}
else if(isDeleting&&j>0){j--;}
else{isDeleting=!isDeleting;if(!isDeleting)i=(i+1)%roles.length;}
setTimeout(type,isDeleting?50:100);
}
type();
</script>

</body>
</html>
